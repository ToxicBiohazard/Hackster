services:
  bot:
    build: .
    env_file:
      - .test.env
      - .docker.env
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11.2
    restart: unless-stopped
    env_file:
      - .docker.env
    ports:
      - "${DOCKER_DB_PORT:-3306}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  mariadb-data:
